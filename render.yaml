# render.yaml -- Render Blueprint for the CRM prototype.
# Render builds straight from the Dockerfile. Push this repo (or upload) to
# Render and it provisions the service using these settings.
services:
  - type: web
    name: crm-prototype
    runtime: docker
    plan: free            # free tier: sleeps after ~15 min idle, wakes in ~30s
    dockerfilePath: ./Dockerfile
    # Persistent disk so added leads/notes survive restarts and redeploys.
    disk:
      name: crm-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DB_PATH
        value: /app/data/crm.sqlite
      # Password gate: set a value here (or in the Render dashboard). The site
      # will then prompt for username "demo" and this password. Leave unset to
      # run open. Marked sync:false so it isn't stored in the repo.
      - key: ACCESS_PASSWORD
        sync: false
      - key: ACCESS_USER
        value: demo
      # Optional: enable AI-assisted fraud analysis by setting your key in the
      # Render dashboard (kept out of the repo).
      - key: ANTHROPIC_API_KEY
        sync: false
