<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pipeline - CRM</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="pipeline" data-nav-module="pipeline">
  <div class="app-frame">
    <aside class="side-nav" aria-label="CRM navigation">
      <a class="side-nav-logo" href="home.html">CRM</a>
      <nav>
        <a href="home.html" data-nav-module="home">Home</a>
        <a href="index.html" data-nav-module="lookup">Search</a>
        <a href="leads.html" data-nav-module="leads">Leads</a>
        <a href="offers.html" data-nav-module="offers">Offers</a>
        <a href="fraud-watch.html" data-nav-module="fraud">Fraud Risk</a>
        <a href="meetings.html" data-nav-module="meetings">Meetings</a>
        <a href="pipeline.html" data-nav-module="pipeline">Pipeline</a>
        <a href="profitability.html" data-nav-module="profitability">Profitability</a>
        <a href="activity.html" data-nav-module="activity">Activity</a>
      </nav>
    </aside>
    <main class="list-shell">
      <header class="list-topbar">
        <div data-page-heading></div>
        <span class="access-pill" id="pageRoleLabel">Role Access</span>
      </header>
      <section id="restrictedState" class="not-found hidden"><h1>Restricted Access</h1><p>This page is restricted for the current role.</p><a class="primary-link" href="home.html">Return home</a></section>
      <section class="filter-bar" data-page-content>
        <div class="filter-group">
          <label class="search-control">
            <span>Search</span>
            <input id="pageSearchInput" type="search" placeholder="Opportunity, product, or status">
          </label>
          <label class="filter-dropdown">
            <span>Stage</span>
            <select id="pageFilterSelect">
              <option value="all">All stages</option>
              <option value="New">New</option>
              <option value="Qualified">Qualified</option>
              <option value="Proposal">Proposal</option>
              <option value="Negotiation">Negotiation</option>
              <option value="Closed">Closed</option>
            </select>
          </label>
          <label class="filter-dropdown">
            <span>Sort</span>
            <select id="pageSortSelect">
              <option value="amount-desc">Amount high to low</option>
              <option value="amount-asc">Amount low to high</option>
              <option value="stage-asc">Stage</option>
              <option value="title-asc">Title A-Z</option>
            </select>
          </label>
        </div>
      </section>
      <section class="pipeline-summary" data-page-content><div id="pipelineSummary" class="stage-summary"></div></section>
      <section id="pipelineBoard" class="kanban-board" data-page-content></section>
    </main>
  </div>
  <script src="data.js"></script>
  <script src="api.js"></script>
  <script src="crm-pages.js"></script>
</body>
</html>
