<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meetings - CRM</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="meetings" data-nav-module="meetings">
  <div class="app-frame">
    <aside class="side-nav" aria-label="CRM navigation">
      <a class="side-nav-logo" href="home.html">CRM</a>
      <nav>
        <a href="home.html" data-nav-module="home">Home</a>
        <a href="index.html" data-nav-module="lookup">Search</a>
        <a href="leads.html" data-nav-module="leads">Leads</a>
        <a href="offers.html" data-nav-module="offers">Offers</a>
        <a href="fraud-watch.html" data-nav-module="fraud">Fraud Risk</a>
        <a href="meetings.html" data-nav-module="meetings">Meetings</a>
        <a href="pipeline.html" data-nav-module="pipeline">Pipeline</a>
        <a href="profitability.html" data-nav-module="profitability">Profitability</a>
        <a href="activity.html" data-nav-module="activity">Activity</a>
      </nav>
    </aside>
    <main class="list-shell">
      <header class="list-topbar">
        <div>
          <p class="eyebrow">Engagement</p>
          <h1>Meetings</h1>
          <p id="meetingsSubtitle">Loading meetings</p>
        </div>
        <span class="access-pill" id="pageRoleLabel">Role Access</span>
      </header>
      <section id="restrictedState" class="not-found hidden"><h1>Restricted Access</h1><p>This page is restricted for the current role.</p><a class="primary-link" href="home.html">Return home</a></section>
      <section class="form-card" data-page-content>
        <div class="form-card-header">
          <div>
            <p class="eyebrow" id="meetingFormEyebrow">Schedule Meeting</p>
            <h2 id="meetingFormTitle">New Client Meeting</h2>
          </div>
          <span class="access-pill">Banker, Wealth, Loans, Admin</span>
        </div>
        <form id="meetingCreateForm" class="crm-form" novalidate>
          <div class="form-grid">
            <label>
              <span>Customer account</span>
              <input id="meetingCustomerField" name="accountNumber" type="text" list="meetingCustomerOptions" placeholder="Example: 10031942">
              <small class="field-error" data-error-for="meetingAccountNumber"></small>
            </label>
            <label>
              <span>Meeting title</span>
              <input id="meetingTitleField" name="title" type="text" maxlength="90" placeholder="Relationship review">
              <small class="field-error" data-error-for="meetingTitle"></small>
            </label>
            <label>
              <span>Date</span>
              <input id="meetingDateField" name="date" type="date">
              <small class="field-error" data-error-for="meetingDate"></small>
            </label>
            <label>
              <span>Owner</span>
              <input id="meetingOwnerField" type="text" value="Current user" disabled>
            </label>
          </div>
          <datalist id="meetingCustomerOptions"></datalist>
          <div class="form-footer">
            <p id="meetingFormMessage" class="form-message hidden" role="status"></p>
            <div class="button-group">
              <button id="meetingCancelEditButton" class="secondary-button hidden" type="button">Cancel edit</button>
              <button id="meetingSubmitButton" type="submit">Schedule meeting</button>
            </div>
          </div>
        </form>
      </section>
      <section class="filter-bar" data-page-content>
        <div class="filter-group">
          <label class="search-control">
            <span>Search</span>
            <input id="pageSearchInput" type="search" placeholder="Meeting, client, owner, or date">
          </label>
          <label class="filter-dropdown">
            <span>Owner</span>
            <select id="pageFilterSelect">
              <option value="all">All owners</option>
              <option value="Nora Whitfield">Nora Whitfield</option>
              <option value="Iris Bennett">Iris Bennett</option>
              <option value="Sophia Ramirez">Sophia Ramirez</option>
            </select>
          </label>
          <label class="filter-dropdown">
            <span>Sort</span>
            <select id="pageSortSelect">
              <option value="date-asc">Date soonest</option>
              <option value="date-desc">Date latest</option>
              <option value="client-asc">Client A-Z</option>
              <option value="owner-asc">Owner A-Z</option>
            </select>
          </label>
        </div>
      </section>
      <section id="meetingListPage" class="card-list" data-page-content></section>
    </main>
  </div>
  <script src="data.js"></script>
  <script src="api.js"></script>
  <script src="crm-pages.js"></script>
</body>
</html>
