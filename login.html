<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="login-screen simple-login">
    <section class="login-panel simple-login-panel" aria-label="CRM login">
      <p class="eyebrow">Community Bank CRM</p>
      <h1>Login</h1>

      <form id="loginForm" class="login-form">
        <label for="testUserSelect">
          Test account
          <select id="testUserSelect" name="testUserSelect">
            <option value="admin.crm.demo@gmail.com">Admin - Morgan Lee</option>
            <option value="hr.crm.demo@gmail.com">HR - Camille Brown</option>
            <option value="banker.crm.demo@gmail.com">Banker - Nora Whitfield</option>
            <option value="wealth.crm.demo@gmail.com">Wealth - Avery Chen</option>
            <option value="fraud.crm.demo@gmail.com">Fraud - Jordan Blake</option>
            <option value="loans.crm.demo@gmail.com">Loans - Taylor Brooks</option>
            <option value="marketing.crm.demo@gmail.com">Marketing - Riley Patel</option>
          </select>
        </label>

        <label for="emailInput">
          Email
          <input id="emailInput" name="emailInput" type="email" autocomplete="off" value="admin.crm.demo@gmail.com">
        </label>

        <label for="passwordInput">
          Password
          <input id="passwordInput" name="passwordInput" type="password" autocomplete="off" placeholder="Enter test password">
        </label>

        <div class="login-options">
          <label class="remember-row" for="rememberMe">
            <input id="rememberMe" type="checkbox">
            Remember me
          </label>
          <a href="home.html">View CRM home</a>
        </div>

        <button type="submit">Login</button>
        <p class="hint">Prototype login only. Test users are seeded in SQLite and passwords are verified on the server.</p>
        <p class="form-error hidden" id="loginError"></p>
      </form>
    </section>
  </main>

  <script src="data.js"></script>
  <script src="api.js"></script>
  <script src="login.js"></script>
</body>
</html>
